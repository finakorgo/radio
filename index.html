<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>A Futura Incubadora de Rádios</title>
    <link href="css/custom.css" rel="stylesheet">
   
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "author": {
    "@type": "Person",
    "name": "José Aparecido Finamor"
  },
  "copyrightHolder": {
    "@type": "Finakorgo Co",
    "name": "radio"
  }
}
</script>  
   
</head>
<body>
<div class="container">
    <div class="top-bar">
        <button class="lang-btn" id="langToggle">🇺🇸 English</button>
    </div>

    <div class="hero">
        <div class="badge" data-key="badge">✨ 12 RÁDIOS INCUBADAS</div>
        <h1 class="one" data-key="one">A FUTURA INCUBADORA DE RÁDIOS</h1> 
        <div class="sub" data-key="subtitle">Plataforma futurista que conecta o mundo através do som. Incubamos estações independentes com tecnologia de ponta.</div>
        <div class="description" data-key="explore">🌍 Exploração Global Sem Fronteiras</div>
    </div>

    <div data-key="sectionTitle" style="font-size: 1.7rem; font-weight: 600; margin-bottom: 1rem;">⭐ Estrelas em Ascensão</div>

    <div class="radio-grid" id="radioGrid"></div>

    <div class="player-section">
        <div class="now-playing" id="nowPlayingText">📻 Selecione uma rádio</div>
        <audio id="audioPlayer" controls></audio>
        <div class="status" id="playerStatus">⚡ Pronto para tocar</div>
    </div>
    <footer class="final">AETHER — frequências do amanhã</footer>
</div>

 <script src="js/index.js"></script> 
</body>
</html>
