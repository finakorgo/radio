<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AETHER • Incubadora de Rádios</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
    
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }

    .neon-text {
      text-shadow: 0 0 15px #22d3ee, 0 0 30px #22d3ee, 0 0 50px #a855f7;
    }

    .glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    #globe-container { width: 100%; height: 100%; background: #000; }
  </style>
</head>
<body class="bg-black text-white">

  <nav class="fixed top-0 w-full z-50 glass border-b border-cyan-500/30">
    <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-3xl flex items-center justify-center text-3xl">🌌</div>
        <h1 class="title-font text-4xl font-bold tracking-tighter neon-text">AETHER</h1>
      </div>
      <div class="flex gap-10 text-sm font-medium">
        <a href="#globe" class="text-cyan-400">Globo 3D</a>
        <a href="#" class="hover:text-cyan-400 transition-colors">Incubar Rádio</a>
      </div>
    </div>
  </nav>

  <section id="globe" class="min-h-screen pt-20 bg-black flex items-center">
    <div class="max-w-screen-2xl mx-auto px-8 w-full">
      <div class="text-center mb-10">
        <h1 class="text-6xl title-font font-bold neon-text mb-4">EXPLORE O PLANETA PELO SOM</h1>
        <p class="text-xl text-gray-400">Arraste para girar • Clique nos pontos • Rádios reais</p>
      </div>

      <div class="glass rounded-3xl overflow-hidden border border-cyan-400/30 shadow-2xl" style="height: 780px;">
        <div id="globe-container"></div>
      </div>
    </div>
  </section>

  <!-- PLAYER -->
  <div id="global-player" class="hidden fixed bottom-0 left-0 right-0 glass border-t border-cyan-500/30 z-50">
    <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center gap-6">
      <div class="flex items-center gap-5 flex-1">
        <div id="now-cover" class="w-16 h-16 bg-gradient-to-br from-purple-500 to-cyan-500 rounded-3xl text-5xl flex items-center justify-center">📻</div>
        <div>
          <p id="now-title" class="text-2xl font-semibold">Carregando...</p>
          <p id="now-station" class="text-cyan-400">—</p>
        </div>
      </div>

      <div class="flex items-center gap-8">
        <button onclick="toggleAudio()" id="play-btn" 
                class="w-20 h-20 bg-white text-black rounded-3xl flex items-center justify-center text-4xl hover:scale-110 transition-all">
          <i class="fa-solid fa-play"></i>
        </button>
      </div>

      <button onclick="togglePlayer()" class="text-3xl text-gray-400 hover:text-white">✕</button>
    </div>
  </div>

  <script>
    let globe;
    let currentAudio = null;
    const CORS_PROXY = "https://corsproxy.io/?";

    async function initGlobe() {
      globe = Globe()(document.getElementById('globe-container'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
        .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
        .atmosphereColor('#22d3ee')
        .atmosphereAltitude(0.25)
        .pointColor(() => '#67e8f9')
        .pointAltitude(0.01)
        .pointRadius(0.13)
        .labelsColor(() => '#a5f3fc')
        .labelsSize(1)
        .labelsAltitude(0.02)
        .onPointClick(d => playStation(d));

      await loadStations();
    }

    async function loadStations() {
      try {
        const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?limit=150&has_geo_info=true&order=clickcount&reverse=true');
        const data = await res.json();

        const stations = data
          .filter(s => s.geo_lat && s.geo_long && s.url_resolved)
          .slice(0, 110)
          .map(s => ({
            name: s.name,
            city: s.country || s.state || s.countrycode,
            lat: parseFloat(s.geo_lat),
            lng: parseFloat(s.geo_long),
            url: s.url_resolved,
            genre: (s.tags || "").split(',').slice(0,2).join(', ') || "Música",
            emoji: "📻"
          }));

        globe.pointsData(stations);
        globe.labelsData(stations.map(s => ({
          lat: s.lat,
          lng: s.lng,
          text: s.name.length > 22 ? s.name.substring(0,19) + "..." : s.name,
          size: 1.1,
          color: '#67e8f9',
          altitude: 0.015
        })));

        console.log(`✅ ${stations.length} estações carregadas`);
      } catch (e) {
        console.error(e);
        alert("Erro ao carregar estações. Tente novamente.");
      }
    }

    async function playStation(station) {
      if (currentAudio) {
        currentAudio.pause();
      }

      const proxyUrl = CORS_PROXY + encodeURIComponent(station.url);
      
      currentAudio = new Audio(proxyUrl);
      
      try {
        await currentAudio.play();
        document.getElementById('now-title').textContent = station.name;
        document.getElementById('now-station').textContent = `${station.city} • ${station.genre}`;
        togglePlayer(true);
      } catch (err) {
        console.error(err);
        alert(`Não foi possível reproduzir ${station.name}.\n\nTente outra estação.`);
      }
    }

    function toggleAudio() {
      if (!currentAudio) return;
      if (currentAudio.paused) {
        currentAudio.play();
        document.getElementById('play-btn').innerHTML = `<i class="fa-solid fa-pause"></i>`;
      } else {
        currentAudio.pause();
        document.getElementById('play-btn').innerHTML = `<i class="fa-solid fa-play"></i>`;
      }
    }

    function togglePlayer(show = null) {
      const player = document.getElementById('global-player');
      show === null ? player.classList.toggle('hidden') : 
      show ? player.classList.remove('hidden') : player.classList.add('hidden');
    }

    window.onload = initGlobe;
  </script>
</body>
</html>
